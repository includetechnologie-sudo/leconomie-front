# Nginx config — leconomie.info
# Chemin : /etc/nginx/sites-available/leconomie.info
# Activer : ln -s /etc/nginx/sites-available/leconomie.info /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name leconomie.info www.leconomie.info;

    # Redirection HTTP → HTTPS (Certbot l'ajoutera automatiquement)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leconomie.info www.leconomie.info;

    # Certificats SSL (générés par Certbot)
    ssl_certificate     /etc/letsencrypt/live/leconomie.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leconomie.info/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/leconomie.access.log;
    error_log  /var/log/nginx/leconomie.error.log;

    # Fichiers statiques Next.js — cache long
    location /_next/static/ {
        alias /var/www/leconomie-front/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images publiques
    location /images/ {
        alias /var/www/leconomie-front/public/images/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Tout le reste → Next.js
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
