name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          cd /var/www/leconomie-front
          git fetch origin main
          git reset --hard origin/main
          /usr/bin/npm ci --production=false
          /usr/bin/npm run build
          pm2 restart leconomie-front || pm2 start npm --name leconomie-front -- start
          pm2 save
